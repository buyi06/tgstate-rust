<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ file.filename }} · tgState</title>
    <link rel="stylesheet" href="/static/ui.css">
    <script>(function(){var p=localStorage.getItem('tgstate_theme_pref');document.documentElement.setAttribute('data-theme',p==='dark'?'dark':'light');})();</script>
</head>
<body>
<div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<button type="button" class="theme-toggle-btn theme-fab" aria-label="切换主题"><span class="theme-ic"></span></button>
<div class="center-page">
    <div class="center-card wide">
        <div class="brand-lg">
            <span class="logo-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></span>
            tgState
        </div>
        <div class="panel" style="text-align:center;">
            <div class="panel-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg></div>
            <h1 style="word-break:break-all;">{{ file.filename }}</h1>
            <div class="dl-meta">
                <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="12" x2="2" y2="12"></line><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>{{ file.filesize_mb }} MB</span>
                <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>{{ file.upload_date_short }}</span>
            </div>
            <a href="{{ file.file_url }}" class="btn btn-primary btn-block" style="margin-bottom:26px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                立即下载
            </a>
            <div style="text-align:left; display:flex; flex-direction:column; gap:14px; border-top:1px solid var(--border); padding-top:22px;">
                <div class="field">
                    <label class="field-label">直链</label>
                    <div class="copybox"><input class="input" id="c-url" value="{{ file.file_url }}" readonly><button class="btn btn-secondary js-copy" data-copy="c-url" type="button">复制</button></div>
                </div>
                <div class="field">
                    <label class="field-label">Markdown</label>
                    <div class="copybox"><input class="input" id="c-md" value="{{ file.markdown_code }}" readonly><button class="btn btn-secondary js-copy" data-copy="c-md" type="button">复制</button></div>
                </div>
                <div class="field">
                    <label class="field-label">HTML</label>
                    <div class="copybox"><input class="input" id="c-html" value="{{ file.html_code }}" readonly><button class="btn btn-secondary js-copy" data-copy="c-html" type="button">复制</button></div>
                </div>
            </div>
        </div>
        <p class="powered">Powered by Telegram</p>
    </div>
</div>
<script src="/static/ui.js"></script>
<script>
    document.querySelectorAll('.js-copy').forEach(function (b) {
        b.addEventListener('click', function () {
            var el = document.getElementById(b.dataset.copy);
            if (el) Utils.copy(el.value);
        });
    });
</script>
</body>
</html>
