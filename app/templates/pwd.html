<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>登录 · tgState</title>
    <link rel="stylesheet" href="/static/ui.css">
    <script>(function(){var p=localStorage.getItem('tgstate_theme_pref');document.documentElement.setAttribute('data-theme',p==='dark'?'dark':'light');})();</script>
</head>
<body>
<div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<button type="button" class="theme-toggle-btn theme-fab" aria-label="切换主题"><span class="theme-ic"></span></button>
<div class="center-page">
    <div class="center-card">
        <div class="brand-lg">
            <span class="logo-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></span>
            tgState
        </div>
        <div class="panel">
            <div class="panel-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>
            <h1>欢迎回来</h1>
            <p class="lead">输入管理员密码以继续。</p>
            <form id="login-form" onsubmit="return false;" style="margin-top:22px;">
                <div class="field">
                    <input type="password" class="input" id="password" placeholder="密码" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top:16px;">登录</button>
            </form>
        </div>
        <p class="powered">Powered by Telegram</p>
    </div>
</div>
<script src="/static/ui.js"></script>
<script>
    function doLogin() {
        var pwd = document.getElementById('password').value;
        if (!pwd) return;
        var btn = document.getElementById('login-btn');
        Utils.setLoading(btn, true);
        fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) })
            .then(function (r) {
                if (r.ok) { window.location.replace('/'); }
                else {
                    Toast.show('密码错误', 'error');
                    var p = document.getElementById('password'); p.value = ''; p.focus();
                    Utils.setLoading(btn, false);
                }
            })
            .catch(function () { Toast.show('网络错误', 'error'); Utils.setLoading(btn, false); });
    }
    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
