<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - tgState</title>
    <link rel="stylesheet" href="/static/ui.css">
    <script src="/static/ui.js"></script>
    <script>
        (function() {
            const pref = localStorage.getItem('tgstate_theme_pref') || 'auto';
            let mode = pref;
            if (pref === 'auto') mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
        })();
    </script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg-body);
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 40px;
        }
        .login-brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
        }
        .login-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--primary-color);
        }
        .login-title {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-desc {
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <div class="login-brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </div>
            tgState
        </div>

        <div class="card login-card">
            <div class="login-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h1 class="login-title">欢迎回来</h1>
            <p class="login-desc">请输入管理员密码以继续访问。</p>

            <form id="login-form" onsubmit="return false;">
                <div class="input-group">
                    <label class="input-label">密码</label>
                    <input type="password" class="input-field" id="password" name="password" placeholder="请输入密码" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px; font-size: 15px;" onclick="submitLogin()">登录</button>
            </form>
        </div>

        <p style="margin-top: 32px; color: var(--text-tertiary); font-size: 13px;">Powered by Telegram</p>
    </div>

    <script>
    async function submitLogin() {
        const pwd = document.getElementById('password').value;
        if (!pwd) return;
        const btn = document.querySelector('button[type="submit"]');
        Utils.setLoading(btn, true);
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pwd })
            });
            if (res.ok) {
                window.location.replace('/');
            } else {
                Toast.show('密码错误', 'error');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        } catch (e) {
            Toast.show('网络错误', 'error');
        } finally {
            Utils.setLoading(btn, false);
        }
    }
    </script>
</body>
</html>
