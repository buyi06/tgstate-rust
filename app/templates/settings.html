{% extends "base.html" %}

{% block title %}设置 · tgState{% endblock %}

{% block content %}
<div style="max-width:680px; margin:0 auto; width:100%;" class="stack">
    <div>
        <h1 class="page-title">系统设置</h1>
        <p class="page-sub">配置 Telegram 机器人与系统参数</p>
    </div>

    <form id="settings-form" onsubmit="return false;" class="stack">
        <div class="card">
            <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> 账号安全</div>
            <div class="field">
                <label class="field-label">管理员密码</label>
                <div class="input-affix">
                    <input type="password" class="input" name="PASS_WORD" id="PASS_WORD" placeholder="留空则不修改">
                    <button type="button" class="affix-btn" id="toggle-pwd" title="显示/隐藏"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> Telegram</div>
            <div class="field" style="margin-bottom:18px;">
                <label class="field-label">Bot Token <span id="bot-badge" class="badge badge-success" style="display:none;">已配置</span></label>
                <input type="text" class="input" name="BOT_TOKEN" id="BOT_TOKEN" placeholder="123456:ABC-DEF1234ghIkl…">
                <div class="field-hint">从 <a href="https://t.me/BotFather" target="_blank" rel="noopener">@BotFather</a> 获取。留空保持当前配置。</div>
            </div>
            <div class="field">
                <label class="field-label">频道</label>
                <input type="text" class="input" name="CHANNEL_NAME" id="CHANNEL_NAME" placeholder="@my_channel 或 -100xxxxxxxx">
                <div class="field-hint">机器人必须是该频道的管理员。</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> 连接</div>
            <div class="field">
                <label class="field-label">Base URL</label>
                <div class="copybox">
                    <input type="text" class="input" name="BASE_URL" id="BASE_URL" placeholder="https://your-domain.com">
                    <button type="button" class="btn btn-secondary" id="fill-origin">使用当前</button>
                </div>
                <div class="field-hint">用于生成分享链接与图片地址。</div>
            </div>
        </div>

        <div class="between wrap">
            <button type="button" class="btn btn-ghost" id="toggle-adv">高级选项</button>
            <div class="row">
                <button type="button" class="btn btn-secondary" id="btn-save">仅保存</button>
                <button type="button" class="btn btn-primary" id="btn-apply">保存并应用</button>
            </div>
        </div>

        <div class="card hidden" id="adv-panel">
            <div class="section-title">连接测试</div>
            <div class="row wrap" style="margin-bottom:22px;">
                <button type="button" class="btn btn-secondary btn-sm" id="btn-test-bot">测试 Bot Token</button>
                <button type="button" class="btn btn-secondary btn-sm" id="btn-test-ch">测试频道</button>
            </div>
            <div style="border-top:1px solid var(--border); padding-top:18px;">
                <div class="section-title" style="color:var(--danger); margin-bottom:12px;">危险区域</div>
                <button type="button" class="btn btn-danger btn-sm" id="btn-reset">重置所有配置</button>
            </div>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    var Toast = window.Toast, Modal = window.Modal, Utils = window.Utils;
    function $(id) { return document.getElementById(id); }

    function initData() {
        fetch('/api/app-config').then(function (r) { return r.json(); }).then(function (data) {
            var cfg = data.cfg || {};
            var ch = document.getElementsByName('CHANNEL_NAME')[0]; if (ch) ch.value = cfg.CHANNEL_NAME || '';
            var bu = document.getElementsByName('BASE_URL')[0]; if (bu) bu.value = cfg.BASE_URL || '';
            if (cfg.BOT_TOKEN_SET) { $('bot-badge').style.display = 'inline-flex'; $('BOT_TOKEN').placeholder = '已配置，留空保持不变'; }
        }).catch(function () {});
    }

    function saveConfig(apply) {
        var btn = apply ? $('btn-apply') : $('btn-save');
        Utils.setLoading(btn, true);
        var data = Object.fromEntries(new FormData($('settings-form')));
        if (!data.PASS_WORD) delete data.PASS_WORD;
        if (!data.BOT_TOKEN) delete data.BOT_TOKEN;
        var url = apply ? '/api/app-config/apply' : '/api/app-config/save';
        fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
            .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
            .then(function (x) {
                if (x.ok) { Toast.show(apply ? '已保存并应用' : '已保存'); if (apply) setTimeout(function () { location.reload(); }, 900); }
                else Toast.show((x.j.detail && x.j.detail.message) || '保存失败', 'error');
            })
            .catch(function () { Toast.show('网络错误', 'error'); })
            .finally(function () { Utils.setLoading(btn, false); });
    }

    function testBot() {
        var btn = $('btn-test-bot'); Utils.setLoading(btn, true);
        var token = document.getElementsByName('BOT_TOKEN')[0].value;
        fetch('/api/verify/bot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ BOT_TOKEN: token || undefined }) })
            .then(function (r) { return r.json(); })
            .then(function (j) { if (j.ok) Toast.show('Bot 验证成功：@' + (j.result && j.result.username)); else Toast.show(j.message || '验证失败', 'error'); })
            .catch(function () { Toast.show('请求失败', 'error'); })
            .finally(function () { Utils.setLoading(btn, false); });
    }

    function testChannel() {
        var btn = $('btn-test-ch'); Utils.setLoading(btn, true);
        var token = document.getElementsByName('BOT_TOKEN')[0].value;
        var ch = document.getElementsByName('CHANNEL_NAME')[0].value;
        fetch('/api/verify/channel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ BOT_TOKEN: token || undefined, CHANNEL_NAME: ch || undefined }) })
            .then(function (r) { return r.json(); })
            .then(function (j) { if (j.available) Toast.show('频道验证成功'); else Toast.show(j.message || '频道不可用', 'error'); })
            .catch(function () { Toast.show('请求失败', 'error'); })
            .finally(function () { Utils.setLoading(btn, false); });
    }

    function resetConfig() {
        Modal.confirm('重置配置', '确定重置所有配置吗？此操作不可撤销，并将强制退出登录。', { danger: true, okText: '重置' }).then(function (ok) {
            if (!ok) return;
            fetch('/api/reset-config', { method: 'POST' }).then(function (r) { return r.json(); }).then(function () {
                Toast.show('已重置，正在跳转…'); setTimeout(function () { location.href = '/welcome'; }, 900);
            }).catch(function () { Toast.show('网络错误', 'error'); });
        });
    }

    $('toggle-pwd').addEventListener('click', function () { var el = $('PASS_WORD'); el.type = el.type === 'password' ? 'text' : 'password'; });
    $('fill-origin').addEventListener('click', function () { $('BASE_URL').value = window.location.origin; });
    $('toggle-adv').addEventListener('click', function () { $('adv-panel').classList.toggle('hidden'); });
    $('btn-save').addEventListener('click', function () { saveConfig(false); });
    $('btn-apply').addEventListener('click', function () { saveConfig(true); });
    $('btn-test-bot').addEventListener('click', testBot);
    $('btn-test-ch').addEventListener('click', testChannel);
    $('btn-reset').addEventListener('click', resetConfig);
    initData();
});
</script>
{% endblock %}
