<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>欢迎 · tgState</title>
    <link rel="stylesheet" href="/static/ui.css">
    <script>(function(){var p=localStorage.getItem('tgstate_theme_pref')||'dark';var m=p==='auto'?(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'):p;document.documentElement.setAttribute('data-theme',m);})();</script>
</head>
<body>
<div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="center-page">
    <div class="center-card">
        <div class="brand-lg">
            <span class="logo-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></span>
            tgState
        </div>
        <div class="panel">
            <div class="panel-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></div>
            <h1>欢迎使用</h1>
            <p class="lead">将 Telegram 变成你的无限私有云。先设置一个管理员密码。</p>
            <form id="setup-form" onsubmit="return false;" style="margin-top:24px;">
                <div class="field">
                    <label class="field-label">管理员密码</label>
                    <input type="password" class="input" id="password" placeholder="设置一个强密码" required autofocus>
                    <div class="field-hint">用于登录管理控制台。</div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="setup-btn" style="margin-top:18px;">完成设置</button>
            </form>
        </div>
        <p class="powered">Powered by Telegram</p>
    </div>
</div>
<script src="/static/ui.js"></script>
<script>
    function submitSetup() {
        var pwd = document.getElementById('password').value;
        if (!pwd) { Toast.show('请输入密码', 'error'); return; }
        var btn = document.getElementById('setup-btn');
        Utils.setLoading(btn, true);
        fetch('/api/set-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) })
            .then(function (res) {
                if (!res.ok) { Toast.show('设置失败', 'error'); Utils.setLoading(btn, false); return; }
                Toast.show('设置成功，正在登录…');
                return fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) })
                    .then(function (login) { setTimeout(function () { window.location.href = login.ok ? '/' : '/login'; }, 800); });
            })
            .catch(function () { Toast.show('网络错误', 'error'); Utils.setLoading(btn, false); });
    }
    document.getElementById('setup-btn').addEventListener('click', submitSetup);
    document.getElementById('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') submitSetup(); });
</script>
</body>
</html>
